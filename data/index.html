<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Webserver</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            color: #333;
            text-align: center;
        }

        .box {
            max-width: 600px;
            margin: 60px auto;
            padding: 25px;
            background: white;
            border-radius: 10px;
        }

        h1 {
            color: #d70000;
            font-size: 50px;
        }

        qwewqeqweqwe p {
            font-size: 18px;
            line-height: 1.5;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background: #0078d7;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #005ea8;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Welcome!</h1>

        <p>
            Hello. This is the ESP32's hosted website.
        </p>

        <p>

        </p>

        <button onclick="alert('Hello from the ESP32!')">

        </button>
    </div>

</html>
